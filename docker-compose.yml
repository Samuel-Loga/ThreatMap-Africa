services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: threatmap
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-threatmap}
      POSTGRES_DB: threatmap
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threatmap"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://threatmap:${POSTGRES_PASSWORD:-threatmap}@db:5432/threatmap
      SYNC_DATABASE_URL: postgresql+psycopg2://threatmap:${POSTGRES_PASSWORD:-threatmap}@db:5432/threatmap
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-changeme-super-secret-key-at-least-32-chars}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        cd /app &&
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

  worker:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://threatmap:${POSTGRES_PASSWORD:-threatmap}@db:5432/threatmap
      SYNC_DATABASE_URL: postgresql+psycopg2://threatmap:${POSTGRES_PASSWORD:-threatmap}@db:5432/threatmap
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-changeme-super-secret-key-at-least-32-chars}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2

  beat:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://threatmap:${POSTGRES_PASSWORD:-threatmap}@db:5432/threatmap
      SYNC_DATABASE_URL: postgresql+psycopg2://threatmap:${POSTGRES_PASSWORD:-threatmap}@db:5432/threatmap
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-changeme-super-secret-key-at-least-32-chars}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker.celery_app beat --loglevel=info

  minio:
    image: minio/minio:RELEASE.2024-06-18T19-53-02Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run build && cp -r dist/* /nginx-html/"
    volumes:
      - ./frontend:/app
      - frontend_build:/nginx-html

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_build:/usr/share/nginx/html:ro
    depends_on:
      - api
      - frontend

volumes:
  pgdata:
  redisdata:
  frontend_build:
  minio_data:
